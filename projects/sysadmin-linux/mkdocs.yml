site_name: Manual SysAdmin Linux
site_description: De 0 a Senior - Ruta completa de aprendizaje para administradores de sistemas Linux.
site_author: dap
site_url: https://dap.gal/sysadmin-linux/
copyright: Copyright &copy; 2026 <a href="https://dap.gal" target="_blank" rel="noopener noreferrer" style="color:DDDDDD"><strong>dap</strong></a> | All rights reserved.

# Configuración del Repositorio (Opcional)
repo_name: dap.gal/guia-sysadmin
repo_url: https://github.com/davidalvarezp/dap.gal/tree/main/projects/sysadmin-linux
edit_uri: edit/main/docs/

# Configuración del Tema
theme:
 name: material
 language: es
 logo: assets/linux.png
 favicon: assets/linux.png
 #font:
 # text: JetBrains Mono
 features:
   - navigation.tabs
   - navigation.tabs.sticky
   - navigation.sections
   - navigation.expand
   - navigation.path
   - navigation.top
   - navigation.indexes
   - navigation.tracking
   - navigation.footer
   - search.suggest
   - search.highlight
   - search.share
   - content.code.copy
   - content.code.annotate
   - content.tooltips
   - header.autohide
   - toc.follow

 palette:
   # Selector de paleta para modo claro
   - media: "(prefers-color-scheme: light)"
     scheme: default
     primary: green
     accent: blue
     toggle:
       icon: material/toggle-switch
       name: Cambiar a modo oscuro
   # Selector de paleta para modo oscuro
   - media: "(prefers-color-scheme: dark)"
     scheme: slate
     primary: green
     accent: blue
     toggle:
       icon: material/toggle-switch-off-outline
       name: Cambiar a modo claro

# Extensiones Markdown
markdown_extensions:
 - admonition
 - attr_list
 - def_list
 - footnotes
 - md_in_html
 - toc:
     permalink: true
     toc_depth: 3
 - pymdownx.arithmatex:
     generic: true
 - pymdownx.betterem:
     smart_enable: all
 - pymdownx.caret
 - pymdownx.details
 - pymdownx.emoji:
     emoji_index: !!python/name:material.extensions.emoji.twemoji
     emoji_generator: !!python/name:material.extensions.emoji.to_svg
 - pymdownx.highlight:
     anchor_linenums: true
     line_spans: __span
     pygments_lang_class: true
 - pymdownx.inlinehilite
 - pymdownx.keys
 - pymdownx.magiclink:
     repo_url_shorthand: true
 - pymdownx.mark
 - pymdownx.smartsymbols
 - pymdownx.superfences:
     custom_fences:
       - name: mermaid
         class: mermaid
         format: !!python/name:pymdownx.superfences.fence_code_format
 - pymdownx.tabbed:
     alternate_style: true
 - pymdownx.tasklist:
     custom_checkbox: true
 - pymdownx.tilde

# Plugins
plugins:
  - search

# Extra
extra:
  social:
    - icon: simple/youtube
      link: https://x.com/davidalvarezp
    - icon: simple/twitch
      link: https://twitch.tv/sudodap
    - icon: simple/telegram
      link: https://t.me/sudodap
    - icon: simple/x 
      link: https://x.com/sudodap
    - icon: simple/instagram
      link: https://instagram.com/davidalvarezzp
    - icon: simple/discord
      link: https://discord.gg/soon

